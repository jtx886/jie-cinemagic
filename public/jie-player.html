<html lang="zh-CN">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:hsl(220 20% 6%);--fg:hsl(210 20% 92%);
  --card:hsl(220 18% 10%);--muted:hsl(220 15% 14%);--muted-fg:hsl(215 12% 55%);
  --primary:hsl(190 80% 50%);--primary-fg:hsl(220 20% 6%);
  --secondary:hsl(220 15% 16%);--secondary-fg:hsl(210 20% 85%);
  --border:hsl(220 15% 18%);--destructive:hsl(0 72% 51%);
  --success:hsl(150 60% 45%);
  --glass-bg:rgba(255,255,255,.04);--glass-border:rgba(255,255,255,.08);
  --glass-shadow:0 8px 32px rgba(0,0,0,.4);--glass-blur:20px;
  --gradient-primary:linear-gradient(135deg,hsl(190 80% 50%),hsl(210 90% 55%));
  --gradient-hero:linear-gradient(180deg,rgba(0,180,220,.15) 0%,transparent 60%);
  --radius:1rem;
}
body{background:var(--bg);color:var(--fg);font-family:'Noto Sans SC',system-ui,sans-serif;overflow-x:hidden;min-height:100vh}
.hero-bg{position:fixed;inset:0;pointer-events:none;background:var(--gradient-hero)}
.glass{background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);box-shadow:var(--glass-shadow)}
.glass-strong{background:rgba(255,255,255,.08);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.12);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.text-gradient{background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.glow{box-shadow:0 0 20px rgba(0,180,220,.3),0 0 60px rgba(0,180,220,.1)}
.scrollbar-hide::-webkit-scrollbar{display:none}.scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
.container{max-width:1100px;margin:0 auto;padding:0 16px;position:relative;z-index:10}
header{padding:16px 0;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:22px;font-weight:900;cursor:pointer}
header .search-box{display:flex;gap:8px;flex:1;max-width:420px;margin-left:24px}
header input{flex:1;padding:10px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--muted);color:var(--fg);font-size:14px;outline:none}
header input:focus{border-color:var(--primary)}
.banner{border-radius:var(--radius);padding:20px;margin:16px 0 24px;text-align:center}
.banner h2{font-size:clamp(22px,3.5vw,32px);font-weight:700;margin-bottom:6px}
.banner p{font-size:13px;color:var(--muted-fg)}
.banner .credits{margin-top:10px;font-size:11px;color:var(--muted-fg);display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--radius);border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--primary);color:var(--primary-fg)}
.btn-primary:hover{opacity:.88}
.btn-secondary{background:var(--secondary);color:var(--secondary-fg);border:1px solid var(--border)}
.btn-secondary:hover{background:hsl(220 15% 20%)}
.btn-active{background:var(--primary)!important;color:var(--primary-fg)!important;border-color:var(--primary)!important}
.btn-sm{padding:6px 12px;font-size:11px;border-radius:10px}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:8px}
button:disabled{opacity:.5;cursor:not-allowed}
.status{font-size:12px;color:var(--muted-fg);margin-top:8px}
.player-wrap{border-radius:var(--radius);overflow:hidden;margin-bottom:12px;position:relative}
.player-inner{position:relative;width:100%;aspect-ratio:16/9;background:#000}
.player-inner iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.player-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted-fg);font-size:13px;height:100%;aspect-ratio:16/9}
.player-overlay{position:absolute;bottom:0;left:0;right:0;padding:8px 12px;background:linear-gradient(transparent,rgba(0,0,0,.7));display:flex;align-items:center;justify-content:space-between;font-size:11px;color:#fff;z-index:5;opacity:0;transition:opacity .3s}
.player-wrap:hover .player-overlay{opacity:1}
.player-overlay .line-info{display:flex;align-items:center;gap:6px}
.player-overlay .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.dplayer{border-radius:var(--radius);overflow:hidden}
.dplayer .dplayer-video-wrap{background:#000}
.line-row{display:flex;gap:6px;overflow-x:auto;align-items:center;padding:4px 0}
.line-row .label{font-size:11px;color:var(--muted-fg);white-space:nowrap}
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:6px;max-height:200px;overflow-y:auto}
.cat-section{margin-bottom:32px}
.cat-section h3{font-size:17px;font-weight:700;margin-bottom:12px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.cat-card{border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s}
.cat-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.5)}
.cat-card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
.cat-card .info{padding:8px}
.cat-card .title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-card .sub{font-size:10px;color:var(--muted-fg);margin-top:2px}
.detail-hero{display:flex;gap:20px;margin:20px 0}
.detail-poster{width:160px;flex-shrink:0}
.detail-poster img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:var(--radius)}
.detail-meta{flex:1}
.detail-meta h2{font-size:22px;font-weight:700;margin-bottom:8px}
.detail-meta .tags{display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--muted-fg);margin-bottom:10px}
.detail-meta .overview{font-size:13px;line-height:1.7;color:var(--secondary-fg);display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
.play-mode-tabs{display:flex;gap:6px;margin-bottom:10px}
.nav-tabs{display:flex;gap:8px;overflow-x:auto;margin-bottom:20px;padding-bottom:4px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:12px;font-weight:500;z-index:9999;transition:all .3s;opacity:0;pointer-events:none}
.toast.show{opacity:1}
.toast-info{background:var(--primary);color:var(--primary-fg)}
.toast-error{background:var(--destructive);color:#fff}
.toast-success{background:var(--success);color:#fff}
.pagination{display:flex;gap:6px;justify-content:center;margin-top:20px}
footer{text-align:center;padding:24px 16px;font-size:11px;color:var(--muted-fg);margin-top:40px}
footer p{margin:3px 0}
@media(max-width:640px){
  header{flex-wrap:wrap;gap:10px}
  header .search-box{max-width:100%;margin-left:0;order:2;width:100%}
  .detail-hero{flex-direction:column;align-items:center;text-align:center}
  .detail-poster{width:120px}
  .cat-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div class="hero-bg"></div>
<div class="toast" id="toast"></div>
<div class="container">
  <header>
    <h1 class="text-gradient" onclick="showHome()">JIE影视4K</h1>
    <div class="search-box">
      <input id="keyword" placeholder="搜索电影、电视剧、动漫…" autocomplete="off"/>
      <button class="btn btn-primary" onclick="doSearch()">搜索</button>
    </div>
  </header>
  <div id="app"></div>
  <footer class="glass-strong">
    <p>JIE影视4K © 2026</p>
    <p>APP开发者：杰同学🐾</p>
    <p>备案号：桂ICP备202602110908号</p>
    <p>本站资源均来自互联网，仅供学习交流使用</p>
  </footer>
</div>
<script>
// ==================== 免费公开API（无需任何密钥） ====================
const VOD_APIS = [
  { name: '黑木耳资源', url: 'https://json.heimuer.xyz/api.php/provide/vod/' },
  { name: '黑木耳备用', url: 'https://json02.heimuer.xyz/api.php/provide/vod/' },
  { name: '飞速资源', url: 'https://api.ffzyapi.com/api.php/provide/vod/' },
  { name: '1080P资源', url: 'https://api.1080p.one/api.php/provide/vod/' },
];
// 主API（用于首页分类浏览）
const PRIMARY_API = VOD_APIS[0].url;

const PARSER_LINES = [
  { name: '解析线路1', base: 'https://jx.xmflv.com/?url=' },
  { name: '解析线路2', base: 'https://jx.playerjy.com/?url=' },
  { name: '解析线路3', base: 'https://jx.m3u8.tv/jiexi/?url=' },
  { name: '解析线路4', base: 'https://jx.jsonplayer.com/player/?url=' },
  { name: '解析线路5', base: 'https://jx.bozrc.com:4433/player/?url=' },
  { name: '解析线路6', base: 'https://www.ckplayer.vip/jiexi/?url=' },
];

// 分类ID映射（苹果CMS标准分类）
const CATEGORIES = [
  { id: 0, title: '🔥 最近更新', params: '?ac=detail&pg=1' },
  { id: 6, title: '🎬 电影', params: '?ac=detail&t=6&pg=1' },
  { id: 13, title: '📺 国产剧', params: '?ac=detail&t=13&pg=1' },
  { id: 15, title: '🇯🇵 日韩剧', params: '?ac=detail&t=15&pg=1' },
  { id: 16, title: '🇺🇸 欧美剧', params: '?ac=detail&t=16&pg=1' },
  { id: 4, title: '🎌 动漫', params: '?ac=detail&t=4&pg=1' },
  { id: 5, title: '🎤 综艺', params: '?ac=detail&t=5&pg=1' },
];

const $ = id => document.getElementById(id);
const app = $('app');
const keywordEl = $('keyword');
let toastTimer = null;
keywordEl.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

function showToast(msg, type = 'info', duration = 3000) {
  const el = $('toast');
  el.textContent = msg;
  el.className = `toast toast-${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// ==================== API 请求 ====================
async function apiFetch(apiUrl, params) {
  const r = await fetch(`${apiUrl}${params}`, { signal: AbortSignal.timeout(12000) });
  if (!r.ok) throw new Error('API error');
  return r.json();
}

// 多源并行搜索
async function vodSearchAll(keyword) {
  const kw = encodeURIComponent(keyword.trim().slice(0, 80));
  if (!kw) return [];
  const promises = VOD_APIS.map(async api => {
    try {
      const d = await apiFetch(api.url, `?ac=detail&wd=${kw}`);
      return (d?.list || []).map(v => ({ ...v, _source: api.name }));
    } catch { return []; }
  });
  const results = await Promise.allSettled(promises);
  const all = [];
  for (const r of results) if (r.status === 'fulfilled') all.push(...r.value);
  const seen = new Set();
  return all.filter(v => { if (seen.has(v.vod_name)) return false; seen.add(v.vod_name); return true; });
}

function parsePlayUrls(playUrl = '', playFrom = '') {
  const sources = playFrom.split('$$$');
  const groups = playUrl.split('$$$');
  return sources.map((name, i) => {
    const eps = (groups[i] || '').split('#').filter(Boolean).map(ep => {
      const [label, url] = ep.split('$');
      return { label: label || '播放', url: url || '' };
    }).filter(v => v.url);
    return { name: name || '默认', urls: eps };
  }).filter(v => v.urls.length);
}

// ==================== DPLAYER ====================
let dp = null;
function destroyDPlayer() { try { if (dp) { dp.destroy(); dp = null; } } catch {} }

function playWithDPlayer(url, container) {
  destroyDPlayer();
  container.innerHTML = '';
  return new Promise((resolve, reject) => {
    try {
      dp = new DPlayer({
        container, autoplay: true, theme: '#00b4d8', lang: 'zh-cn',
        video: {
          url, type: 'customHls',
          customType: {
            customHls(video) {
              const hls = new Hls({ maxBufferLength: 30, maxMaxBufferLength: 60 });
              hls.loadSource(video.src);
              hls.attachMedia(video);
              hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(() => {}); resolve(); });
              hls.on(Hls.Events.ERROR, (_, d) => { if (d.fatal) reject(new Error('HLS error')); });
              setTimeout(() => reject(new Error('timeout')), 10000);
            },
          },
        },
      });
    } catch (e) { reject(e); }
  });
}

// ==================== IFRAME 播放器 + 自动轮询 ====================
let currentRawUrl = '', currentParserIdx = 0, rotateTimer = null, triedParsers = new Set();
let playMode = 'auto';

function clearRotate() { clearTimeout(rotateTimer); triedParsers.clear(); }

function updateLineButtons() {
  document.querySelectorAll('#parserBtns .pbtn').forEach((b, i) => {
    b.classList.toggle('btn-active', i === currentParserIdx);
    b.classList.toggle('btn-secondary', i !== currentParserIdx);
  });
}

function setPlayerOverlay(msg, spinning = false) {
  const ol = $('playerOverlay');
  if (!ol) return;
  ol.querySelector('.line-info').innerHTML = (spinning ? '<div class="spinner"></div>' : '') + `<span>${msg}</span>`;
  ol.style.opacity = '1';
  if (!spinning) setTimeout(() => { if (ol) ol.style.opacity = ''; }, 2500);
}

function playInIframe(rawUrl, parserIdx = 0) {
  destroyDPlayer();
  currentRawUrl = rawUrl; currentParserIdx = parserIdx;
  const wrap = $('playerInner');
  if (!wrap) return;
  const iframeUrl = PARSER_LINES[parserIdx].base + encodeURIComponent(rawUrl);
  wrap.innerHTML = `<iframe id="playFrame" src="${iframeUrl}" allowfullscreen allow="autoplay;encrypted-media;fullscreen;picture-in-picture" referrerpolicy="no-referrer"></iframe>`;
  updateLineButtons();
  setPlayerOverlay(`正在使用 ${PARSER_LINES[parserIdx].name} 加载…`, true);
  triedParsers.add(parserIdx);
  clearTimeout(rotateTimer);
  rotateTimer = setTimeout(() => tryNextParser(), 12000);
  const frame = $('playFrame');
  if (frame) {
    frame.addEventListener('load', () => { clearTimeout(rotateTimer); setPlayerOverlay(`${PARSER_LINES[parserIdx].name} 加载完成`, false); });
    frame.addEventListener('error', () => tryNextParser());
  }
}

function tryNextParser() {
  clearTimeout(rotateTimer);
  if (!currentRawUrl) return;
  let nextIdx = -1;
  for (let i = 0; i < PARSER_LINES.length; i++) {
    const idx = (currentParserIdx + 1 + i) % PARSER_LINES.length;
    if (!triedParsers.has(idx)) { nextIdx = idx; break; }
  }
  if (nextIdx === -1) { setPlayerOverlay('所有线路均已尝试，请手动选择', false); showToast('所有播放线路均已尝试', 'error'); return; }
  showToast(`自动切换到 ${PARSER_LINES[nextIdx].name}`, 'info');
  playInIframe(currentRawUrl, nextIdx);
}

function switchParser(idx) { clearRotate(); playMode = 'iframe'; updateModeButtons(); playInIframe(currentRawUrl, idx); }

async function smartPlay(url) {
  currentRawUrl = url;
  const wrap = $('playerInner');
  if (!wrap) return;
  if (playMode === 'iframe' || !url.includes('.m3u8')) { clearRotate(); playInIframe(url, 0); return; }
  wrap.innerHTML = '<div id="dplayerBox" style="width:100%;height:100%"></div>';
  setPlayerOverlay('DPlayer 直连播放中…', true);
  try {
    await playWithDPlayer(url, $('dplayerBox'));
    setPlayerOverlay('DPlayer 播放中', false);
    showToast('直连播放成功', 'success');
  } catch {
    showToast('直连失败，切换解析播放', 'info');
    clearRotate(); playInIframe(url, 0);
  }
}

function updateModeButtons() {
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('btn-active', b.dataset.mode === playMode);
    b.classList.toggle('btn-secondary', b.dataset.mode !== playMode);
  });
}
function setPlayMode(mode) {
  playMode = mode; updateModeButtons();
  if (currentRawUrl) { destroyDPlayer(); clearRotate(); smartPlay(currentRawUrl); }
}

function renderPlayer() {
  return `
    <div class="player-wrap glass">
      <div class="player-inner" id="playerInner"><div class="player-empty">点击选集开始播放</div></div>
      <div class="player-overlay" id="playerOverlay"><div class="line-info"></div></div>
    </div>
    <div class="glass" style="border-radius:var(--radius);padding:10px;margin-bottom:10px">
      <div class="play-mode-tabs">
        <span class="label" style="font-size:11px;color:var(--muted-fg);padding:4px 0">播放模式：</span>
        <button class="btn btn-xs mode-btn btn-active" data-mode="auto" onclick="setPlayMode('auto')">智能</button>
        <button class="btn btn-xs mode-btn btn-secondary" data-mode="dplayer" onclick="setPlayMode('dplayer')">DPlayer</button>
        <button class="btn btn-xs mode-btn btn-secondary" data-mode="iframe" onclick="setPlayMode('iframe')">解析</button>
      </div>
      <div class="line-row scrollbar-hide" id="parserBtns">
        <span class="label">解析线路：</span>
        ${PARSER_LINES.map((l, i) => `<button class="btn btn-xs pbtn ${i === 0 ? 'btn-active' : 'btn-secondary'}" onclick="switchParser(${i})">${l.name}</button>`).join('')}
      </div>
    </div>`;
}

// ==================== 首页 ====================
let currentCat = 0;

async function showHome() {
  keywordEl.value = '';
  clearRotate(); destroyDPlayer();
  currentCat = 0;

  let html = `
    <div class="banner glass"><h2 class="text-gradient">JIE影视4K</h2>
      <p>免费在线观看 · 高清4K · 无广告 · 全网资源 · 无需会员</p>
      <div class="credits"><span>APP开发者：杰同学🐾</span><span>桂ICP备202602110908号</span></div>
    </div>
    <div class="nav-tabs scrollbar-hide" id="catTabs">
      ${CATEGORIES.map((c, i) => `<button class="btn btn-sm ${i === 0 ? 'btn-active' : 'btn-secondary'}" onclick="loadCategory(${i})">${c.title}</button>`).join('')}
    </div>
    <div id="catContent">加载中…</div>
    <div id="catPagination"></div>`;
  app.innerHTML = html;
  loadCategory(0);
}

async function loadCategory(catIdx, page = 1) {
  currentCat = catIdx;
  const cat = CATEGORIES[catIdx];
  // Update tabs
  document.querySelectorAll('#catTabs .btn').forEach((b, i) => {
    b.classList.toggle('btn-active', i === catIdx);
    b.classList.toggle('btn-secondary', i !== catIdx);
  });
  const content = $('catContent');
  content.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted-fg)">加载中…</div>';

  try {
    const params = cat.id === 0 ? `?ac=detail&pg=${page}` : `?ac=detail&t=${cat.id}&pg=${page}`;
    const data = await apiFetch(PRIMARY_API, params);
    const items = data?.list || [];
    const totalPage = data?.pagecount || 1;

    if (!items.length) {
      content.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted-fg)">暂无内容</div>';
      return;
    }

    let html = '<div class="cat-grid">';
    items.forEach(item => {
      const pic = item.vod_pic || '';
      const name = (item.vod_name || '未知').replace(/'/g, '&#39;');
      const remark = item.vod_remarks || '';
      html += `<div class="cat-card glass" onclick="showDetail(${item.vod_id})">
        ${pic ? `<img src="${pic}" alt="${name}" loading="lazy" onerror="this.style.background='var(--muted)';this.style.minHeight='180px'"/>` : '<div style="aspect-ratio:2/3;background:var(--muted)"></div>'}
        <div class="info"><div class="title">${name}</div><div class="sub">${remark}</div></div>
      </div>`;
    });
    html += '</div>';
    content.innerHTML = html;

    // Pagination
    let pgHtml = '';
    if (totalPage > 1) {
      pgHtml = '<div class="pagination">';
      if (page > 1) pgHtml += `<button class="btn btn-xs btn-secondary" onclick="loadCategory(${catIdx},${page - 1})">上一页</button>`;
      pgHtml += `<span style="font-size:12px;color:var(--muted-fg);padding:4px 8px">${page} / ${totalPage}</span>`;
      if (page < totalPage) pgHtml += `<button class="btn btn-xs btn-secondary" onclick="loadCategory(${catIdx},${page + 1})">下一页</button>`;
      pgHtml += '</div>';
    }
    $('catPagination').innerHTML = pgHtml;
  } catch (e) {
    content.innerHTML = `<div style="text-align:center;padding:40px;color:var(--destructive)">加载失败，请重试</div>`;
  }
}

// ==================== 详情页 ====================
let cachedSources = [];
let activeSource = 0, activeEp = 0;

async function showDetail(vodId) {
  window.scrollTo({ top: 0, behavior: 'smooth' });
  clearRotate(); destroyDPlayer();
  cachedSources = []; activeSource = 0; activeEp = 0;
  app.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted-fg)">加载详情中…</div>';

  try {
    // 尝试从所有API获取详情
    let detail = null;
    for (const api of VOD_APIS) {
      try {
        const data = await apiFetch(api.url, `?ac=detail&ids=${vodId}`);
        if (data?.list?.[0]) { detail = data.list[0]; break; }
      } catch {}
    }

    if (!detail) { app.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted-fg)">未找到该影视</div>'; return; }

    const name = (detail.vod_name || '未知').replace(/'/g, '&#39;');
    const pic = detail.vod_pic || '';
    const year = detail.vod_year || '';
    const area = detail.vod_area || '';
    const type = detail.type_name || '';
    const remarks = detail.vod_remarks || '';
    const desc = (detail.vod_content || '').replace(/<[^>]+>/g, '');
    const actor = detail.vod_actor || '';
    const director = detail.vod_director || '';

    const sources = parsePlayUrls(detail.vod_play_url, detail.vod_play_from);
    cachedSources = sources;

    app.innerHTML = `
      <div class="detail-hero">
        <div class="detail-poster">${pic ? `<img src="${pic}" alt="${name}" onerror="this.style.background='var(--muted)'"/>` : '<div style="aspect-ratio:2/3;background:var(--muted);border-radius:var(--radius);width:100%"></div>'}</div>
        <div class="detail-meta">
          <h2>${name}</h2>
          <div class="tags">
            ${type ? `<span>🎬 ${type}</span>` : ''}
            ${year ? `<span>📅 ${year}</span>` : ''}
            ${area ? `<span>📍 ${area}</span>` : ''}
            ${remarks ? `<span>📌 ${remarks}</span>` : ''}
          </div>
          ${director ? `<p style="font-size:12px;color:var(--muted-fg);margin-bottom:4px">导演：${director}</p>` : ''}
          ${actor ? `<p style="font-size:12px;color:var(--muted-fg);margin-bottom:8px">主演：${actor.slice(0,80)}${actor.length>80?'…':''}</p>` : ''}
          ${desc ? `<p class="overview">${desc}</p>` : ''}
          <button class="btn btn-primary glow" style="margin-top:14px" onclick="startPlay()">▶ 立即播放</button>
          <p style="font-size:11px;color:var(--success);margin-top:6px">${sources.length ? `✅ 已找到 ${sources.reduce((a,s)=>a+s.urls.length,0)} 个播放资源` : ''}</p>
        </div>
      </div>
      <div id="playerArea"></div>
      <div id="vodSources"></div>
      <div style="margin-top:16px"><button class="btn btn-secondary" onclick="searchMore('${name}')">🔍 搜索更多源</button></div>`;

    if (sources.length) renderVodSources();
  } catch (e) {
    app.innerHTML = `<div style="text-align:center;padding:60px;color:var(--destructive)">加载失败: ${e.message}</div>`;
  }
}

async function searchMore(title) {
  showToast('正在搜索更多资源…', 'info');
  const results = await vodSearchAll(title);
  if (!results.length) { showToast('未找到更多资源', 'error'); return; }

  // Merge sources
  let newSources = [];
  for (const item of results) {
    const s = parsePlayUrls(item.vod_play_url, item.vod_play_from);
    s.forEach(src => { src.name = `${item._source} - ${src.name}`; });
    newSources.push(...s);
  }
  if (newSources.length) {
    cachedSources = [...cachedSources, ...newSources];
    renderVodSources();
    showToast(`找到 ${newSources.reduce((a,s)=>a+s.urls.length,0)} 个额外资源`, 'success');
  }
}

function renderVodSources() {
  const el = $('vodSources');
  if (!el || !cachedSources.length) return;
  let html = '<div class="glass" style="border-radius:var(--radius);padding:12px;margin-top:12px">';
  if (cachedSources.length > 1) {
    html += '<div class="line-row scrollbar-hide" style="margin-bottom:8px"><span class="label">资源线路：</span>';
    cachedSources.forEach((s, i) => {
      html += `<button class="btn btn-xs ${i === activeSource ? 'btn-active' : 'btn-secondary'}" onclick="switchSource(${i})">${s.name || '线路'+(i+1)}</button>`;
    });
    html += '</div>';
  }
  const eps = cachedSources[activeSource]?.urls || [];
  if (eps.length > 0) {
    html += `<p style="font-size:11px;color:var(--muted-fg);margin-bottom:6px">选集 (共${eps.length}集)：</p><div class="ep-grid scrollbar-hide">`;
    eps.forEach((ep, i) => {
      html += `<button class="btn btn-xs ${i === activeEp ? 'btn-active' : 'btn-secondary'}" onclick="playEp(${activeSource},${i})">${ep.label}</button>`;
    });
    html += '</div>';
  }
  html += '</div>';
  el.innerHTML = html;
}

function switchSource(idx) {
  activeSource = idx; activeEp = 0; renderVodSources();
  const url = cachedSources[idx]?.urls[0]?.url;
  if (url) { ensurePlayer(); clearRotate(); smartPlay(url); }
}

function playEp(srcIdx, epIdx) {
  activeSource = srcIdx; activeEp = epIdx; renderVodSources();
  const url = cachedSources[srcIdx]?.urls[epIdx]?.url;
  if (url) { ensurePlayer(); clearRotate(); smartPlay(url); }
}

function ensurePlayer() {
  const area = $('playerArea');
  if (area && !$('playerInner')) area.innerHTML = renderPlayer();
}

function startPlay() {
  ensurePlayer();
  if (cachedSources.length && cachedSources[activeSource]?.urls[activeEp]?.url) {
    clearRotate(); smartPlay(cachedSources[activeSource].urls[activeEp].url);
  } else { showToast('暂无播放资源', 'error'); }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ==================== 搜索 ====================
async function doSearch() {
  const kw = keywordEl.value.trim();
  if (!kw) return;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  clearRotate(); destroyDPlayer();
  app.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted-fg)">搜索中…</div>';

  try {
    const items = await vodSearchAll(kw);
    if (!items.length) {
      app.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted-fg)">未找到任何结果，换个关键词试试</div>';
      return;
    }

    let html = '<div id="searchPlayerArea"></div><section class="cat-section"><h3>🔍 搜索结果</h3><div class="cat-grid">';
    items.forEach(item => {
      const pic = item.vod_pic || '';
      const name = (item.vod_name || '未知').replace(/'/g, '&#39;');
      const remark = item.vod_remarks || '';
      const src = item._source || '';
      html += `<div class="cat-card glass" onclick="showDetail(${item.vod_id})">
        ${pic ? `<img src="${pic}" alt="${name}" loading="lazy" onerror="this.style.background='var(--muted)';this.style.minHeight='180px'"/>` : '<div style="aspect-ratio:2/3;background:var(--muted)"></div>'}
        <div class="info"><div class="title">${name}</div><div class="sub">${remark} · ${src}</div></div>
      </div>`;
    });
    html += '</div></section>';
    app.innerHTML = html;
  } catch (e) {
    app.innerHTML = `<div style="text-align:center;padding:40px;color:var(--destructive)">搜索失败: ${e}</div>`;
  }
}

// ==================== INIT ====================
showHome();
</script>
</body>
</html>
