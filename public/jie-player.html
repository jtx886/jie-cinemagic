<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>JIE影视4K - 独立播放器</title>
<meta name="description" content="JIE影视4K - 免费在线观看高清电影、电视剧、动漫，无广告，支持4K高清播放">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.15/dist/hls.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:hsl(220 20% 6%);--fg:hsl(210 20% 92%);
  --card:hsl(220 18% 10%);--muted:hsl(220 15% 14%);--muted-fg:hsl(215 12% 55%);
  --primary:hsl(190 80% 50%);--primary-fg:hsl(220 20% 6%);
  --secondary:hsl(220 15% 16%);--secondary-fg:hsl(210 20% 85%);
  --border:hsl(220 15% 18%);--destructive:hsl(0 72% 51%);
  --glass-bg:rgba(255,255,255,.04);--glass-border:rgba(255,255,255,.08);
  --glass-shadow:0 8px 32px rgba(0,0,0,.4);--glass-blur:20px;
  --gradient-primary:linear-gradient(135deg,hsl(190 80% 50%),hsl(210 90% 55%));
  --gradient-hero:linear-gradient(180deg,rgba(0,180,220,.15) 0%,transparent 60%);
  --radius:1rem;
}
body{background:var(--bg);color:var(--fg);font-family:'Noto Sans SC',system-ui,sans-serif;overflow-x:hidden;min-height:100vh}
.hero-bg{position:fixed;inset:0;pointer-events:none;background:var(--gradient-hero)}
.glass{background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);box-shadow:var(--glass-shadow)}
.glass-strong{background:rgba(255,255,255,.08);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.12);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.text-gradient{background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.glow{box-shadow:0 0 20px rgba(0,180,220,.3),0 0 60px rgba(0,180,220,.1)}
.scrollbar-hide::-webkit-scrollbar{display:none}.scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}

.container{max-width:1100px;margin:0 auto;padding:0 16px;position:relative;z-index:10}

/* Header */
header{padding:16px 0;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:22px;font-weight:900}
header .search-box{display:flex;gap:8px;flex:1;max-width:420px;margin-left:24px}
header input{flex:1;padding:10px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--muted);color:var(--fg);font-size:14px;outline:none}
header input:focus{border-color:var(--primary)}

/* Banner */
.banner{border-radius:var(--radius);padding:20px;margin:16px 0 24px;text-align:center}
.banner h2{font-size:clamp(22px,3.5vw,32px);font-weight:700;margin-bottom:6px}
.banner p{font-size:13px;color:var(--muted-fg)}
.banner .credits{margin-top:10px;font-size:11px;color:var(--muted-fg);display:flex;gap:16px;justify-content:center;flex-wrap:wrap}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--radius);border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--primary);color:var(--primary-fg)}
.btn-primary:hover{opacity:.88}
.btn-secondary{background:var(--secondary);color:var(--secondary-fg);border:1px solid var(--border)}
.btn-secondary:hover{background:hsl(220 15% 20%)}
.btn-active{background:var(--primary)!important;color:var(--primary-fg)!important;border-color:var(--primary)!important}
.btn-sm{padding:6px 12px;font-size:11px;border-radius:10px}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:8px}
button:disabled{opacity:.5;cursor:not-allowed}

/* Status */
.status{font-size:12px;color:var(--muted-fg);margin-top:8px}
.status.error{color:var(--destructive)}

/* Player */
.player-wrap{border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.player-inner{position:relative;width:100%;aspect-ratio:16/9;background:#000}
.player-inner video,.player-inner iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.player-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted-fg);font-size:13px}

/* Lines */
.line-row{display:flex;gap:6px;overflow-x:auto;align-items:center;padding:4px 0}
.line-row .label{font-size:11px;color:var(--muted-fg);white-space:nowrap}

/* Episodes Grid */
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:6px;max-height:200px;overflow-y:auto}

/* Results */
.results{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.result-item{border-radius:var(--radius);padding:12px;display:flex;gap:12px}
.result-item img{width:80px;height:110px;object-fit:cover;border-radius:10px;flex-shrink:0}
.result-info{flex:1;min-width:0}
.result-info h3{font-size:15px;font-weight:600;margin-bottom:4px}
.result-info p{font-size:12px;color:var(--muted-fg);margin-bottom:8px}
.result-info .ep-btns{display:flex;flex-wrap:wrap;gap:5px}

/* Categories */
.cat-section{margin-bottom:32px}
.cat-section h3{font-size:17px;font-weight:700;margin-bottom:12px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.cat-card{border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s}
.cat-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.5)}
.cat-card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
.cat-card .info{padding:8px;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-card .score{font-size:10px;color:var(--muted-fg)}

/* Detail Page */
.detail-hero{display:flex;gap:20px;margin:20px 0}
.detail-poster{width:140px;flex-shrink:0}
.detail-poster img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:var(--radius)}
.detail-meta{flex:1}
.detail-meta h2{font-size:22px;font-weight:700;margin-bottom:8px}
.detail-meta .tags{display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--muted-fg);margin-bottom:10px}
.detail-meta .overview{font-size:13px;line-height:1.7;color:var(--secondary-fg);display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}

/* Footer */
footer{text-align:center;padding:24px 16px;font-size:11px;color:var(--muted-fg);margin-top:40px}
footer p{margin:3px 0}

/* Responsive */
@media(max-width:640px){
  header{flex-wrap:wrap;gap:10px}
  header .search-box{max-width:100%;margin-left:0;order:2;width:100%}
  .detail-hero{flex-direction:column;align-items:center;text-align:center}
  .detail-poster{width:120px}
  .cat-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<div class="hero-bg"></div>

<div class="container">
  <!-- Header -->
  <header>
    <h1 class="text-gradient" style="cursor:pointer" onclick="showHome()">JIE影视4K</h1>
    <div class="search-box">
      <input id="keyword" placeholder="搜索电影、电视剧、动漫…" autocomplete="off"/>
      <button class="btn btn-primary" id="searchBtn" onclick="doSearch()">搜索</button>
    </div>
  </header>

  <!-- Main Content -->
  <div id="app"></div>

  <!-- Footer -->
  <footer class="glass-strong">
    <p>JIE影视4K © 2026</p>
    <p>APP开发者：杰同学🐾</p>
    <p>备案号：桂ICP备202602110908号</p>
    <p>本站资源均来自互联网，仅供学习交流使用</p>
  </footer>
</div>

<script>
// ==================== CONFIG ====================
const TMDB_KEY = 'cb44223c5dee5676ed3a839f42ed27e3';
const TMDB = 'https://api.themoviedb.org/3';
const IMG = 'https://image.tmdb.org/t/p';
const VOD_APIS = [
  'https://api.ffzyapi.com/api.php/provide/vod/',
  'https://api.1080p.one/api.php/provide/vod/',
  'https://api.xinlangapi.com/xinlangapi.php/provide/vod/',
];
const PARSER_LINES = [
  { name: '播放线路1', base: 'https://jx.playerjy.com/?url=' },
  { name: '播放线路2', base: 'https://jx.m3u8.tv/jiexi/?url=' },
  { name: '播放线路3', base: 'https://www.ckplayer.vip/jiexi/?url=' },
  { name: '备用线路', base: 'https://jx.jsonplayer.com/player/?url=' },
];

const $ = id => document.getElementById(id);
const app = $('app');
const keywordEl = $('keyword');

keywordEl.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

// ==================== TMDB API ====================
async function tmdbFetch(endpoint, params = {}) {
  const sp = new URLSearchParams({ api_key: TMDB_KEY, language: 'zh-CN', ...params });
  const r = await fetch(`${TMDB}${endpoint}?${sp}`);
  if (!r.ok) throw new Error('TMDB error');
  return r.json();
}
function imgUrl(path, size = 'w500') { return path ? `${IMG}/${size}${path}` : ''; }

// ==================== VOD Search (direct, no edge function) ====================
async function vodSearch(keyword) {
  const kw = encodeURIComponent(keyword.trim().slice(0, 80));
  if (!kw) return [];
  const promises = VOD_APIS.map(async api => {
    try {
      const r = await fetch(`${api}?ac=detail&wd=${kw}`, { signal: AbortSignal.timeout(8000) });
      if (!r.ok) return [];
      const d = await r.json();
      return d?.list || [];
    } catch { return []; }
  });
  const results = await Promise.allSettled(promises);
  const all = [];
  for (const r of results) if (r.status === 'fulfilled') all.push(...r.value);
  const seen = new Set();
  return all.filter(v => { if (seen.has(v.vod_name)) return false; seen.add(v.vod_name); return true; });
}

function parsePlayUrls(playUrl = '', playFrom = '') {
  const sources = playFrom.split('$$$');
  const groups = playUrl.split('$$$');
  return sources.map((name, i) => {
    const eps = (groups[i] || '').split('#').filter(Boolean).map(ep => {
      const [label, url] = ep.split('$');
      return { label: label || '播放', url: url || '' };
    }).filter(v => v.url);
    return { name, urls: eps };
  }).filter(v => v.urls.length);
}

// ==================== PLAYER ====================
let hlsInstance = null;
let currentRawUrl = '';
let currentParserIdx = 0;

function destroyHls() { if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; } }

function playInIframe(rawUrl, parserIdx = 0) {
  currentRawUrl = rawUrl;
  currentParserIdx = parserIdx;
  const wrap = $('playerInner');
  if (!wrap) return;
  destroyHls();
  wrap.innerHTML = `<iframe src="${PARSER_LINES[parserIdx].base}${encodeURIComponent(rawUrl)}" allowfullscreen allow="autoplay;encrypted-media;fullscreen" referrerpolicy="no-referrer"></iframe>`;
}

function renderPlayer() {
  return `
    <div class="player-wrap glass">
      <div class="player-inner" id="playerInner">
        <div class="player-empty">点击选集开始播放</div>
      </div>
    </div>
    <div class="glass" style="border-radius:var(--radius);padding:10px;margin-bottom:10px">
      <div class="line-row scrollbar-hide">
        <span class="label">播放线路：</span>
        ${PARSER_LINES.map((l, i) => `<button class="btn btn-xs ${i === 0 ? 'btn-active' : 'btn-secondary'}" onclick="switchParser(${i})">${l.name}</button>`).join('')}
      </div>
    </div>`;
}

function switchParser(idx) {
  currentParserIdx = idx;
  if (currentRawUrl) playInIframe(currentRawUrl, idx);
  document.querySelectorAll('.line-row .btn').forEach((b, i) => {
    b.classList.toggle('btn-active', i === idx);
    b.classList.toggle('btn-secondary', i !== idx);
  });
}

// ==================== HOME PAGE ====================
const CATEGORIES = [
  { title: '🔥 正在热映', fn: () => tmdbFetch('/movie/now_playing') },
  { title: '🎬 热门电影', fn: () => tmdbFetch('/movie/popular') },
  { title: '📺 热门剧集', fn: () => tmdbFetch('/tv/popular') },
  { title: '🎌 日本动漫', fn: () => tmdbFetch('/discover/tv', { with_genres: '16', with_original_language: 'ja', sort_by: 'popularity.desc' }) },
  { title: '🐉 国漫精选', fn: () => tmdbFetch('/discover/tv', { with_genres: '16', with_original_language: 'zh', sort_by: 'popularity.desc' }) },
  { title: '⭐ 高分电影', fn: () => tmdbFetch('/movie/top_rated') },
];

async function showHome() {
  keywordEl.value = '';
  app.innerHTML = `
    <div class="banner glass" style="border-radius:var(--radius)">
      <h2 class="text-gradient">JIE影视4K</h2>
      <p>免费在线观看 · 高清4K · 无广告 · 电影 · 电视剧 · 动漫</p>
      <div class="credits"><span>APP开发者：杰同学🐾</span><span>桂ICP备202602110908号</span></div>
    </div>
    <div id="cats">加载中…</div>`;

  const catsEl = $('cats');
  const results = await Promise.allSettled(CATEGORIES.map(c => c.fn()));
  let html = '';
  results.forEach((r, i) => {
    if (r.status !== 'fulfilled') return;
    const items = (r.value.results || []).slice(0, 12);
    if (!items.length) return;
    html += `<section class="cat-section"><h3>${CATEGORIES[i].title}</h3><div class="cat-grid">`;
    items.forEach(item => {
      const t = item.title || item.name || '未知';
      const mediaType = item.media_type || (item.title ? 'movie' : 'tv');
      const poster = imgUrl(item.poster_path, 'w342');
      const score = item.vote_average ? item.vote_average.toFixed(1) : '';
      html += `<div class="cat-card glass" onclick="showDetail('${mediaType}',${item.id})">
        ${poster ? `<img src="${poster}" alt="${t}" loading="lazy" onerror="this.style.display='none'"/>` : '<div style="aspect-ratio:2/3;background:var(--muted)"></div>'}
        <div class="info">${t} <span class="score">${score ? '⭐' + score : ''}</span></div>
      </div>`;
    });
    html += '</div></section>';
  });
  catsEl.innerHTML = html || '<p style="color:var(--muted-fg)">加载分类失败</p>';
}

// ==================== DETAIL PAGE ====================
async function showDetail(mediaType, id) {
  window.scrollTo({ top: 0, behavior: 'smooth' });
  app.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted-fg)">加载详情中…</div>';

  try {
    const detail = mediaType === 'movie'
      ? await tmdbFetch(`/movie/${id}`)
      : await tmdbFetch(`/tv/${id}`);

    const title = detail.title || detail.name || '未知';
    const year = (detail.release_date || detail.first_air_date || '').slice(0, 4);
    const genres = (detail.genres || []).map(g => g.name).join(' / ');
    const poster = imgUrl(detail.poster_path, 'w342');

    app.innerHTML = `
      <div class="detail-hero">
        <div class="detail-poster">${poster ? `<img src="${poster}" alt="${title}" onerror="this.style.display='none'"/>` : ''}</div>
        <div class="detail-meta">
          <h2>${title}</h2>
          <div class="tags">
            ${genres ? `<span>🎬 ${genres}</span>` : ''}
            ${year ? `<span>📅 ${year}</span>` : ''}
            ${detail.vote_average ? `<span>⭐ ${detail.vote_average.toFixed(1)}</span>` : ''}
          </div>
          ${detail.overview ? `<p class="overview">${detail.overview}</p>` : ''}
          <button class="btn btn-primary glow" style="margin-top:14px" onclick="startPlay('${title}','${year}')">▶ 立即播放</button>
          <div id="vodStatus" class="status" style="margin-top:6px"></div>
        </div>
      </div>
      <div id="playerArea"></div>
      <div id="vodSources"></div>`;

    // Auto search playable sources
    searchVodSources(title, year);
  } catch (e) {
    app.innerHTML = `<div style="text-align:center;padding:60px;color:var(--destructive)">加载失败: ${e.message}</div>`;
  }
}

let cachedVodSources = [];
let activeVodSource = 0;
let activeVodEp = 0;

async function searchVodSources(title, year) {
  const statusEl = $('vodStatus');
  if (statusEl) statusEl.textContent = '正在搜索播放资源…';

  const cleaned = title.replace(/[：:（(].*?[）)]/g, '').replace(/\s+/g, ' ').trim();
  const candidates = [...new Set([title.trim(), cleaned, year ? `${cleaned} ${year}` : ''].filter(Boolean))];

  for (const kw of candidates) {
    const results = await vodSearch(kw);
    if (!results.length) continue;
    const match = results.find(r => r.vod_name.includes(kw) || kw.includes(r.vod_name)) || results[0];
    const sources = parsePlayUrls(match.vod_play_url, match.vod_play_from);
    if (sources.length && sources[0]?.urls[0]?.url) {
      cachedVodSources = sources;
      activeVodSource = 0;
      activeVodEp = 0;
      const total = sources.reduce((a, s) => a + s.urls.length, 0);
      if (statusEl) statusEl.innerHTML = `<span style="color:hsl(120 60% 50%)">✅ 已找到 ${total} 个播放资源</span>`;
      renderVodSources();
      return;
    }
  }
  if (statusEl) statusEl.innerHTML = '<span style="color:var(--destructive)">未找到可播放资源</span>';
}

function renderVodSources() {
  const el = $('vodSources');
  if (!el || !cachedVodSources.length) return;

  let html = '<div class="glass" style="border-radius:var(--radius);padding:12px;margin-top:12px">';

  if (cachedVodSources.length > 1) {
    html += '<div class="line-row scrollbar-hide" style="margin-bottom:8px"><span class="label">资源线路：</span>';
    cachedVodSources.forEach((s, i) => {
      html += `<button class="btn btn-xs ${i === activeVodSource ? 'btn-active' : 'btn-secondary'}" onclick="switchVodSource(${i})">${s.name || '线路' + (i + 1)}</button>`;
    });
    html += '</div>';
  }

  const eps = cachedVodSources[activeVodSource]?.urls || [];
  if (eps.length > 0) {
    html += '<p style="font-size:11px;color:var(--muted-fg);margin-bottom:6px">选集：</p><div class="ep-grid scrollbar-hide">';
    eps.forEach((ep, i) => {
      html += `<button class="btn btn-xs ${i === activeVodEp ? 'btn-active' : 'btn-secondary'}" onclick="playEp(${activeVodSource},${i})">${ep.label}</button>`;
    });
    html += '</div>';
  }

  html += '</div>';
  el.innerHTML = html;
}

function switchVodSource(idx) {
  activeVodSource = idx;
  activeVodEp = 0;
  renderVodSources();
  const url = cachedVodSources[idx]?.urls[0]?.url;
  if (url) { ensurePlayer(); playInIframe(url, currentParserIdx); }
}

function playEp(srcIdx, epIdx) {
  activeVodSource = srcIdx;
  activeVodEp = epIdx;
  renderVodSources();
  const url = cachedVodSources[srcIdx]?.urls[epIdx]?.url;
  if (url) { ensurePlayer(); playInIframe(url, currentParserIdx); }
}

function ensurePlayer() {
  const area = $('playerArea');
  if (!area) return;
  if (!$('playerInner')) {
    area.innerHTML = renderPlayer();
  }
}

function startPlay(title, year) {
  ensurePlayer();
  if (cachedVodSources.length && cachedVodSources[activeVodSource]?.urls[activeVodEp]?.url) {
    playInIframe(cachedVodSources[activeVodSource].urls[activeVodEp].url, currentParserIdx);
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ==================== SEARCH PAGE ====================
async function doSearch() {
  const kw = keywordEl.value.trim();
  if (!kw) return;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  app.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted-fg)">搜索中…</div>';

  try {
    const [tmdbRes, vodRes] = await Promise.allSettled([
      tmdbFetch('/search/multi', { query: kw }),
      vodSearch(kw),
    ]);

    const tmdbItems = tmdbRes.status === 'fulfilled' ? (tmdbRes.value.results || []).filter(v => v.poster_path).slice(0, 12) : [];
    const vodItems = vodRes.status === 'fulfilled' ? vodRes.value.slice(0, 15) : [];

    let html = '';

    if (tmdbItems.length) {
      html += `<section class="cat-section"><h3>🔍 TMDB 搜索结果</h3><div class="cat-grid">`;
      tmdbItems.forEach(item => {
        const t = item.title || item.name || '未知';
        const mt = item.media_type || (item.title ? 'movie' : 'tv');
        html += `<div class="cat-card glass" onclick="showDetail('${mt}',${item.id})">
          <img src="${imgUrl(item.poster_path,'w342')}" alt="${t}" loading="lazy" onerror="this.style.display='none'"/>
          <div class="info">${t}</div></div>`;
      });
      html += '</div></section>';
    }

    if (vodItems.length) {
      html += '<section class="cat-section"><h3>🎬 可播放资源</h3><div class="results">';
      vodItems.forEach(item => {
        const sources = parsePlayUrls(item.vod_play_url, item.vod_play_from);
        const firstEps = sources[0]?.urls.slice(0, 20) || [];
        html += `<div class="result-item glass">
          ${item.vod_pic ? `<img src="${item.vod_pic}" onerror="this.style.display='none'" loading="lazy"/>` : ''}
          <div class="result-info">
            <h3>${item.vod_name}</h3>
            <p>${item.type_name || ''} · ${item.vod_remarks || ''}</p>
            <div class="ep-btns">
              ${firstEps.length ? firstEps.map((ep, i) =>
                `<button class="btn btn-xs btn-secondary" onclick="playDirect(this,\`${ep.url.replace(/`/g,'')}\`)">${ep.label}</button>`
              ).join('') : '<span style="font-size:11px;color:var(--muted-fg)">暂无选集</span>'}
            </div>
          </div>
        </div>`;
      });
      html += '</div></section>';
    }

    if (!html) html = '<div style="text-align:center;padding:40px;color:var(--muted-fg)">未找到任何结果</div>';

    app.innerHTML = `<div id="searchPlayerArea"></div>` + html;
  } catch (e) {
    app.innerHTML = `<div style="text-align:center;padding:40px;color:var(--destructive)">搜索失败: ${e}</div>`;
  }
}

function playDirect(btnEl, url) {
  // Ensure player exists at top
  let area = $('searchPlayerArea') || $('playerArea');
  if (!area) { app.insertAdjacentHTML('afterbegin', '<div id="searchPlayerArea"></div>'); area = $('searchPlayerArea'); }
  if (!area.querySelector('#playerInner')) area.innerHTML = renderPlayer();
  playInIframe(url, currentParserIdx);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ==================== INIT ====================
showHome();
</script>
